<!DOCTYPE html>
<html>
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farmer AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main">
<h1>🌱 Smart Farmer – AI Plant Disease Doctor</h1>
<p id="subtitle">
Upload leaf photo to detect disease and solution
</p>
<div class="container">

<!-- LEFT PANEL -->
<div class="left">
<h2 id="uploadTitle">
1. Upload Leaf Image
</h2>
<p id="langLabel">Language</p>
<button id="btnEn" class="langBtn active" onclick="setLang('en')">
English
</button>
<button id="btnKn" class="langBtn" onclick="setLang('kn')">
ಕನ್ನಡ
</button>
<br><br>
<input type="file" id="imageInput">
<p id="uploadTip">
Click here or upload leaf image
</p>
<img id="preview">
<br><br>
<button class="predictBtn" onclick="predict()" id="predictBtn">
Predict Disease
</button>
<p id="status"></p>
</div>
<!-- RIGHT PANEL -->
<div class="right">
<h2 id="resultTitle">
2. Result
</h2>
<h3 id="disease"></h3>
<p id="confidence"></p>
<h4 id="descTitle">
Disease Description
</h4>
<p id="description"></p>
<h4 id="precautionTitle">
Precautions
</h4>
<p id="precaution"></p>
<h4 id="solutionTitle">
Solution
</h4>
<p id="solution"></p>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
